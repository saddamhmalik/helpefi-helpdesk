name: Deploy to Production

# Run only when changes land on main (e.g. after a PR merge).
on:
  push:
    branches:
      - main

# Prevent overlapping deploys; let the in-flight deployment finish.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # SSH into the Ubuntu EC2 host and run the full release script remotely.
      # set -euo pipefail in the script exits on the first failing command.
      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            APP_DIR="/home/ubuntu/helpefi-helpdesk"
            cd "$APP_DIR"

            # Recover from root-owned files after manual sudo npm/composer on the server.
            if [ ! -w package-lock.json ] || { [ -d node_modules ] && [ ! -w node_modules ]; }; then
              sudo chown -R ubuntu:ubuntu package.json package-lock.json node_modules 2>/dev/null || true
            fi

            # Sync the server checkout with the latest main branch.
            git fetch origin main
            git checkout main
            git pull origin main

            # Install PHP dependencies for production (no dev packages).
            composer install --no-dev --optimize-autoloader --no-interaction

            # Vite, Tailwind, and laravel-vite-plugin are devDependencies but required to build assets.
            npm ci
            npm run build
            npm prune --omit=dev

            # Apply central and tenant database migrations in production.
            php artisan migrate --force
            php artisan tenants:migrate --force

            php artisan tenants:upgrade

            php artisan marketing:sync-content
            php artisan marketing:ping-sitemap || true

            # Laravel writable paths for PHP-FPM (www-data).
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R ug+rwx storage bootstrap/cache

            # Clear stale caches, then rebuild Laravel optimization caches.
            php artisan optimize:clear
            php artisan optimize

            # Signal queue workers to restart after the current job finishes.
            php artisan queue:restart
