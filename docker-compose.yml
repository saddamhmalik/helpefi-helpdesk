services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: helpdesk_central
      MYSQL_USER: helpdesk
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uhelpdesk", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      target: app-dev
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    entrypoint: ["/bin/sh", "/var/www/html/docker/migrate.sh"]
    restart: "no"

  app:
    build:
      context: .
      target: app-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
      - app_storage:/var/www/html/storage/app
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-helpdesk.ini:ro
    extra_hosts:
      - "helpdesk.test:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "helpdesk.test:host-gateway"

  queue:
    build:
      context: .
      target: app-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
      - app_storage:/var/www/html/storage/app
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-helpdesk.ini:ro
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--timeout=3600"]

  scheduler:
    build:
      context: .
      target: app-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-helpdesk.ini:ro
    command: ["/bin/sh", "/var/www/html/docker/scheduler.sh"]

  realtime:
    build:
      context: .
      target: realtime
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
  app_storage:
