services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-helpdesk_central}
      MYSQL_USER: ${DB_USERNAME:-helpdesk}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${DB_USERNAME:-helpdesk}", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      target: app
    env_file:
      - .env
    environment:
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
      DOCKER_OPTIMIZE: "false"
      HELPEFI_DEPLOYMENT_MODE: self_hosted
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/var/www/html/docker/migrate.sh"]
    restart: "no"

  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
      DOCKER_OPTIMIZE: "true"
      HELPEFI_DEPLOYMENT_MODE: self_hosted
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage/app

  nginx:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"

  queue:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WAIT_FOR_DB: "false"
      WAIT_FOR_REDIS: "true"
      DOCKER_OPTIMIZE: "true"
      HELPEFI_DEPLOYMENT_MODE: self_hosted
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage/app
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--timeout=900"]

  scheduler:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WAIT_FOR_DB: "false"
      WAIT_FOR_REDIS: "true"
      DOCKER_OPTIMIZE: "true"
      HELPEFI_DEPLOYMENT_MODE: self_hosted
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/bin/sh", "/var/www/html/docker/scheduler.sh"]

  realtime:
    build:
      context: .
      target: realtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REALTIME_WS_HOST: 0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${REALTIME_PORT:-8080}:8080"

volumes:
  mysql_data:
  app_storage:
